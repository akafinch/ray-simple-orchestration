apiVersion: v1
kind: Service
metadata:
  name: demo-app-svc
  namespace: default
  annotations:
    # Linode NodeBalancer tuning
    service.beta.kubernetes.io/linode-loadbalancer-throttle: "4"
spec:
  type: LoadBalancer
  selector:
    app: demo-app
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
