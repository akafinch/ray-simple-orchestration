apiVersion: v1
kind: ConfigMap
metadata:
  name: inference-config
  namespace: ray-system
data:
  # Ray Serve base URL — the RayService-managed serve service
  # CLIP endpoint: {ray-serve-url}/clip
  # CLAP endpoint: {ray-serve-url}/clap
  ray-serve-url: "http://clip-clap-serve-svc.ray-system:8000"
  # Linode Object Storage S3-compatible endpoint
  obj-endpoint: "https://us-ord-1.linodeobjects.com"
  # Model bucket name
  model-bucket: "clip-clap-weights"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: inference-config
  namespace: default
data:
  # Duplicated into default namespace for the demo app pods
  ray-serve-url: "http://clip-clap-serve-svc.ray-system:8000"
  obj-endpoint: "https://us-ord-1.linodeobjects.com"
  model-bucket: "clip-clap-weights"
